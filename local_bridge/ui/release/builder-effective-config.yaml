directories:
  output: release
  buildResources: build
appId: ai.oxbuild.compliance-agent
productName: Oxbuild Compliance Agent
asar: true
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - '!**/node_modules/**'
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
win:
  target:
    - target: nsis
      arch:
        - x64
linux:
  target:
    - target: AppImage
      arch:
        - x64
electronVersion: 31.7.7
